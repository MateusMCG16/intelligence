<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="background-color: black; border-radius: 4px;">
  <!-- Center Node -->
  <circle cx="12" cy="12" r="3" fill="white"/>
  
  <!-- Outer Nodes -->
  <circle cx="5" cy="6" r="1.5" fill="none"/>
  <circle cx="19" cy="6" r="1.5" fill="none"/>
  <circle cx="5" cy="18" r="1.5" fill="none"/>
  <circle cx="19" cy="18" r="1.5" fill="none"/>

  <!-- Links to Center -->
  <line x1="6.5" y1="7.5" x2="10" y2="10.5"/>
  <line x1="17.5" y1="7.5" x2="14" y2="10.5"/>
  <line x1="6.5" y1="16.5" x2="10" y2="13.5"/>
  <line x1="17.5" y1="16.5" x2="14" y2="13.5"/>

  <!-- Outer Links -->
  <line x1="6" y1="6" x2="18" y2="6" stroke-dasharray="2 3" opacity="0.3"/>
  <line x1="6" y1="18" x2="18" y2="18" stroke-dasharray="2 3" opacity="0.3"/>
</svg>
